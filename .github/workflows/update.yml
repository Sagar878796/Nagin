name: IPTV Auto Updater

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest M3U
        run: |
          curl -L "http://datahub11.com/get.php?username=910039307&password=782745303&type=m3u_plus&output=ts" -o playlist.m3u

      - name: Validate file
        run: |
          echo "File size:"
          ls -lh playlist.m3u
          head -n 5 playlist.m3u

      - name: Commit & Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          git commit -m "Auto update playlist $(date)" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
