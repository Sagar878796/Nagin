name: IPTV No Buffer Cleaner

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  clean-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download M3U
        run: |
          curl -L "http://datahub11.com/get.php?username=230155634&password=188156327&type=m3u_plus&output=ts" -o input.m3u

      - name: Clean Playlist (No Buffer Logic)
        run: |
          echo "#EXTM3U" > clean.m3u

          # Remove duplicates + keep only useful streams
          awk '!seen[$0]++' input.m3u > temp.m3u

          while read -r line; do
            if [[ "$line" == \#EXTINF* ]]; then
              read -r url

              # Only keep good formats
              if [[ "$url" == *".m3u8"* || "$url" == *".ts"* ]]; then
                
                # Speed check (3 sec timeout)
                status=$(curl -o /dev/null -s -w "%{http_code}" --max-time 3 "$url")

                if [[ "$status" == "200" ]]; then
                  echo "$line" >> clean.m3u
                  echo "$url" >> clean.m3u
                fi

              fi
            fi
          done < temp.m3u

      - name: Optimize (Sort + Remove empty)
        run: |
          grep -v "^$" clean.m3u > final.m3u
          mv final.m3u playlist.m3u

      - name: Commit & Push
        run: |
          git config --global user.name "iptv-cleaner"
          git config --global user.email "bot@github.com"
          git add playlist.m3u
          git commit -m "No-buffer cleaned $(date)" || echo "No changes"
          git push
