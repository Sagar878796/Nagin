name: JSON TO M3U AUTO

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download JSON
        run: |
          curl -L "https://allinonereborn.online/jtv-fetch/jstr4web.json" -o data.json

      - name: Convert JSON to M3U
        run: |
          echo '#EXTM3U' > playlist.m3u

          jq -r '
          .[] |

          "#EXTINF:-1 tvg-id=\"" + (.id // "") + "\" tvg-name=\"" + (.name // "") + "\" tvg-logo=\"" + (.logo // "") + "\" group-title=\"" + (.category // "Live") + "\"," + (.name // "Unknown") + "\n" +

          "#KODIPROP:inputstream.adaptive.manifest_type=mpd\n" +

          "#KODIPROP:inputstream.adaptive.license_type=clearkey\n" +

          "#KODIPROP:inputstream.adaptive.license_key=" + (.keyId // "") + ":" + (.key // "") + "\n" +

          (.url // "") + "\n"

          ' data.json >> playlist.m3u

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add playlist.m3u

          git commit -m "Auto Update Playlist" || echo "No changes"

          git push
