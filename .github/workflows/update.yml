name: JTV JSON → M3U Generator

permissions:
  contents: write

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  generate-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate playlist
        run: |
          mkdir -p Playlist

          OUTPUT=Playlist/index.m3u
          JSON=data.json

          # Clean old
          rm -f $OUTPUT $JSON

          # Header
          echo '#EXTM3U' > $OUTPUT
          echo "# Updated $(date)" >> $OUTPUT

          # Fetch your JSON
          echo "Fetching JSON..."
          curl -L -s "https://allinonereborn.online/jtv-fetch/jstr4web.json" -o $JSON

          # Check JSON
          if jq empty $JSON 2>/dev/null; then
            echo "Valid JSON ✅"

            jq -r '
            .[]? |
            select(.url != null) |
            "#EXTINF:-1 tvg-id=\"\(.id // "0")\" tvg-name=\"\(.name // .title // "Channel")\" tvg-logo=\"\(.logo // "")\" group-title=\"\(.group // "JioTV")\",\(.name // .title // "Channel")\n\(.url)"
            ' $JSON >> $OUTPUT

          else
            echo "Invalid JSON ❌"
            echo "#EXTINF:-1,No Channels Available" >> $OUTPUT
          fi

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Playlist/index.m3u
          git commit -m "Auto update JTV playlist $(date)" || echo "No changes"
          git pull --rebase origin main || true
          git push origin main
