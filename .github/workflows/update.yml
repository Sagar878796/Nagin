name: IPTV Auto Proxy Playlist (India Live TV Only)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download Playlist (Retry + Headers)
        run: |
          URL="http://desyra.co:8080/get.php?username=gRVSxCJCuX&password=yummy9training&type=m3u_plus&output=ts"

          for i in 1 2 3; do
            echo "Attempt $i..."
            curl -L \
              -A "Mozilla/5.0" \
              --connect-timeout 10 \
              --max-time 30 \
              "$URL" -o full.m3u && break

            echo "Retrying in 5 seconds..."
            sleep 5
          done

      - name: Validate Download
        run: |
          if [ ! -s full.m3u ]; then
            echo "❌ Download failed or empty file"
            exit 1
          fi

          if ! grep -q "#EXTM3U" full.m3u; then
            echo "❌ Invalid playlist format"
            exit 1
          fi

      - name: Filter Only Indian Live TV Channels
        run: |
          echo "#EXTM3U" > playlist.m3u

          awk '
          /#EXTINF/ {
            line=$0
            getline url

            # Skip movies & series
            if (url ~ /\/movie\// || url ~ /\/series\//) next

            # Skip VOD categories
            if (line ~ /(VOD|Movies|Series)/) next

            # Keep only Indian channels (FIXED)
            if (line ~ /(country="?IN"?|tvg-country="?IN"?|India|Hindi|Tamil|Telugu|Punjabi|Bengali|Marathi|Malayalam|Kannada|Sports|Cricket|IPL)/) {
              print line
              print url
            }
          }
          ' full.m3u >> playlist.m3u

      - name: Remove Duplicates
        run: |
          awk '!seen[$0]++' playlist.m3u > clean.m3u
          mv clean.m3u playlist.m3u

      - name: Final Check
        run: |
          if [ ! -s playlist.m3u ]; then
            echo "❌ Final playlist empty"
            exit 1
          fi

      - name: Commit & Push
        run: |
          git config --global user.name "iptv-bot"
          git config --global user.email "iptv-bot@users.noreply.github.com"

          git add playlist.m3u
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "🇮🇳 Auto update Indian Live TV $(date)"
          git push
