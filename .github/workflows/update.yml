name: Full IPL 2026 Playlist (All Channels)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Source Playlist
        run: |
          curl -L "http://desyra.co:8080/get.php?username=gRVSxCJCuX&password=yummy9training&type=m3u_plus&output=ts" -o full.m3u

      - name: Extract ALL IPL Channels (No Miss)
        run: |
          echo "#EXTM3U" > playlist.m3u

          awk '
          BEGIN{IGNORECASE=1}

          /#EXTINF/ {
            info=$0
            getline url

            # ❌ Remove Movies / VOD
            if (info ~ /(movie|vod|series|film|cinema)/) next

            # ✅ Include ALL IPL related entries
            if (info ~ /(ipl|cricket|star sports|willow)/) {

              # 🔥 Force group to IPL (2026)
              gsub(/group-title="[^"]*"/, "group-title=\"IPL (2026)\"", info)

              print info
              print url
            }
          }
          ' full.m3u >> playlist.m3u

      - name: Remove Duplicate Channels
        run: |
          awk '!seen[$0]++' playlist.m3u > temp.m3u
          mv temp.m3u playlist.m3u

      - name: Limit Size (Avoid GitHub Error)
        run: |
          awk '
          BEGIN{count=0}
          /^#EXTINF/ {
            if(count<300){
              print
              getline
              print
              count++
            }
          }
          ' playlist.m3u > limited.m3u

          echo "#EXTM3U" > final.m3u
          cat limited.m3u >> final.m3u
          mv final.m3u playlist.m3u

      - name: Commit & Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add playlist.m3u
          git commit -m "Full IPL update $(date)" || echo "No changes"
          git push
