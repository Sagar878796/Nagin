name: IPTV Live TV + IPL Section

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Source Playlist
        run: |
          curl -L "http://desyra.co:8080/get.php?username=gRVSxCJCuX&password=yummy9training&type=m3u_plus&output=ts" -o full.m3u

      - name: Create Clean Playlist with IPL Section
        run: |
          echo "#EXTM3U" > playlist.m3u

          awk '
          BEGIN{IGNORECASE=1}

          /#EXTINF/ {
            info=$0
            getline url

            # ❌ Remove Movies / Series / VOD
            if (info ~ /(movie|vod|series|film|cinema)/) next

            # 🔥 IPL / Cricket → force into IPL group
            if (info ~ /(star sports|sports18|cricket|ipl)/) {
              gsub(/group-title="[^"]*"/, "group-title=\"IPL\"", info)
              print info
              print url
            }

            # 📰 News Channels
            else if (info ~ /(news|aaj tak|abp|zee news|ndtv|republic)/) {
              gsub(/group-title="[^"]*"/, "group-title=\"News\"", info)
              print info
              print url
            }

            # 📺 Entertainment
            else if (info ~ /(star plus|sony|zee tv|colors)/) {
              gsub(/group-title="[^"]*"/, "group-title=\"Entertainment\"", info)
              print info
              print url
            }
          }
          ' full.m3u >> playlist.m3u

      - name: Remove Duplicates
        run: |
          awk '!seen[$0]++' playlist.m3u > temp.m3u
          mv temp.m3u playlist.m3u

      - name: Limit Size (Max 500 Channels)
        run: |
          awk '
          BEGIN{count=0}
          /^#EXTINF/ {
            if(count<500){
              print
              getline
              print
              count++
            }
          }
          ' playlist.m3u > limited.m3u

          echo "#EXTM3U" > final.m3u
          cat limited.m3u >> final.m3u
          mv final.m3u playlist.m3u

      - name: Commit & Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add playlist.m3u
          git commit -m "Auto update $(date)" || echo "No changes"
          git push
