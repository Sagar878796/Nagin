name: Auto-Update M3U

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'   # har 6 ghante (zyada safe)

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Install jq + curl
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Generate jiotv.m3u
        run: |
          echo "📥 Fetching JSON..."

          URLS=(
            "https://jtv.pfy.workers.dev"
            "https://allinonereborn.online/jtv-fetch/jstr4web.json"
          )

          JSON=""

          # 🔁 Multi-source fallback
          for URL in "${URLS[@]}"; do
            echo "Trying $URL"
            JSON=$(curl -sfL \
              -H "User-Agent: Mozilla/5.0" \
              -H "Accept: application/json" \
              "$URL") && break
          done

          if [ -z "$JSON" ]; then
            echo "❌ All sources failed"
            exit 1
          fi

          if [[ "$JSON" == \<* ]]; then
            echo "❌ Got HTML instead of JSON"
            exit 1
          fi

          echo "#EXTM3U" > jiotv.m3u

          echo "$JSON" | jq -r '
            def normalize:
              if type == "array" then .
              elif type == "object" then
                if has("channels") then .channels
                elif has("data") then .data
                elif has("list") then .list
                else [.[]]
                end
              else []
              end;

            normalize[]
            | select(type=="object")

            | (.name // .title // .channel_name // "Unknown") as $name
            | (.logo // .tvg_logo // "") as $logo
            | (.group // .category // "Live TV") as $group
            | (.url // .link // .stream_url // .mpd // "") as $url

            | select($url != "")

            | "#EXTINF:-1 tvg-logo=\"\($logo)\" group-title=\"\($group)\",\($name)"
            , "#EXTVLCOPT:http-user-agent=Mozilla/5.0"
            , $url
            , ""
          ' >> jiotv.m3u

          # 🧹 Remove duplicate links
          awk '!seen[$0]++' jiotv.m3u > temp && mv temp jiotv.m3u

          # ✅ Final check
          COUNT=$(grep -c "^#EXTINF" jiotv.m3u)

          if [ "$COUNT" -lt 5 ]; then
            echo "❌ Too few channels ($COUNT)"
            exit 1
          fi

          echo "✅ Generated $COUNT channels"

      - name: Commit & Push
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@github.com"

          git add jiotv.m3u

          if git diff --cached --quiet; then
            echo "➡️ No changes"
            exit 0
          fi

          git commit -m "🔄 Auto Update: $(date -u '+%Y-%m-%d %H:%M')"
          git push
