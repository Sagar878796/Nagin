name: IPL 2026 Only Playlist

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Source Playlist
        run: |
          curl -L "http://desyra.co:8080/get.php?username=gRVSxCJCuX&password=yummy9training&type=m3u_plus&output=ts" -o full.m3u

      - name: Extract Only IPL (2026) Group
        run: |
          echo "#EXTM3U" > playlist.m3u

          awk '
          BEGIN{IGNORECASE=1}

          /#EXTINF/ {
            info=$0
            getline url

            # ❌ Remove Movies / Series
            if (info ~ /(movie|vod|series|film|cinema)/) next

            # ✅ Keep ONLY IPL (2026) group (exact match)
            if (info ~ /group-title="IPL \(2026\)"/) {
              print info
              print url
            }
          }
          ' full.m3u >> playlist.m3u

      - name: Remove Duplicates
        run: |
          awk '!seen[$0]++' playlist.m3u > temp.m3u
          mv temp.m3u playlist.m3u

      - name: Commit & Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add playlist.m3u
          git commit -m "IPL 2026 update $(date)" || echo "No changes"
          git push
