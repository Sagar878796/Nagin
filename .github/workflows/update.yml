name: IPTV Auto Updater (India Only)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download full M3U
        run: |
          curl -L "http://datahub11.com/get.php?username=230155634&password=188156327&type=m3u_plus&output=ts" -o full.m3u

      - name: Filter India channels
        run: |
          echo "#EXTM3U" > playlist.m3u
          grep -i -A1 "india\|sports india\|sony\|star sports\|dd\|zeetv\|aaj tak\|news|ipl/ipl" full.m3u >> playlist.m3u || true

      - name: Validate file
        run: |
          echo "Final file:"
          ls -lh playlist.m3u
          head -n 20 playlist.m3u

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          git commit -m "India-only playlist update $(date)" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
