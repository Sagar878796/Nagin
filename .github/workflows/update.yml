name: IPTV Auto Updater

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest M3U
        run: |
          curl -L "https://yowaimo.in/StreamFlexTv/playlist.php?name=SFBRMYCG&token=e1265dd4bee0302fd0fc7d50" -o playlist.m3u

      - name: Validate file
        run: |
          echo "File size:"
          ls -lh playlist.m3u
          head -n 5 playlist.m3u

      - name: Commit & Push changes
        run: |
          git config --global user.name "iptv-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add playlist.m3u
          git commit -m "Auto update playlist $(date)" || echo "No changes"
          git push
