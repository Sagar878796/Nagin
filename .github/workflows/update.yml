name: JSON to M3U

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JSON
        run: |
          curl -L "https://allinonereborn.online/jtv-fetch/jstr4web.json" -o data.json

      - name: Convert JSON to M3U
        run: |
          echo '#EXTM3U' > playlist.m3u

          jq -r '
          .[] |
          "#EXTINF:-1 group-title=\"" + (.category // "Live") + "\"," + .name + "\n" + .url
          ' data.json >> playlist.m3u

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add playlist.m3u
          git commit -m "Auto update M3U" || echo "No changes"

          git push
